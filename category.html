    :root { --red: #E8001D; --dark: #0D0D0D; --light: #F7F5F0; --mid: #EBEBEB; --accent: #FFD600; --text: #1A1A1A; --muted: #6B6B6B; --white: #FFFFFF; }

    .topbar a { color: var(--accent); text-decoration: none; }
    nav { background: var(--white); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 70px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--mid); box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.7rem; color: var(--dark); letter-spacing: -0.03em; text-decoration: none; }
    .logo span { color: var(--red); }
    .search-bar { flex: 1; max-width: 480px; margin: 0 2rem; display: flex; border: 2px solid var(--dark); border-radius: 6px; overflow: hidden; }

    .search-bar button { background: var(--red); color: white; border: none; padding: 0 18px; cursor: pointer; font-size: 1rem; }
    .nav-icons { display: flex; gap: 1.2rem; align-items: center; }
    .nav-icon { display: flex; flex-direction: column; align-items: center; font-size: 0.68rem; color: var(--muted); cursor: pointer; gap: 3px; text-decoration: none; transition: color 0.2s; }
    .nav-icon:hover { color: var(--red); }
    .nav-icon svg { width: 22px; height: 22px; }
    .badge { position: absolute; top: -6px; right: -8px; background: var(--red); color: white; font-size: 0.6rem; width: 17px; height: 17px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .cat-nav { background: var(--dark); display: flex; overflow-x: auto; scrollbar-width: none; }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-nav a { color: #ccc; text-decoration: none; font-size: 0.82rem; padding: 12px 18px; white-space: nowrap; transition: background 0.2s, color 0.2s; }
    .cat-nav a:hover, .cat-nav a.active { background: var(--red); color: white; }
    .breadcrumb { padding: 14px 5%; font-size: 0.82rem; color: var(--muted); display: flex; gap: 8px; }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--red); }
    .breadcrumb span { color: var(--text); font-weight: 500; }

    .cat-banner::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 80% 50%, rgba(232,0,29,0.3) 0%, transparent 60%); }
    .cat-banner-text { position: relative; z-index: 2; }
    .cat-banner-text h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; color: white; margin-bottom: 8px; }
    .cat-banner-text h1 span { color: var(--accent); }
    .cat-banner-text p { color: #aaa; font-size: 0.9rem; }
    .cat-banner-icons { font-size: 3.5rem; position: relative; z-index: 2; opacity: 0.8; letter-spacing: 8px; }
    .sub-cats { display: flex; gap: 10px; padding: 0 5% 20px; overflow-x: auto; scrollbar-width: none; }
    .sub-cats::-webkit-scrollbar { display: none; }
    .sub-cat { display: flex; flex-direction: column; align-items: center; gap: 6px; background: white; border: 2px solid var(--mid); border-radius: 10px; padding: 12px 20px; cursor: pointer; white-space: nowrap; transition: border-color 0.2s; min-width: 80px; text-align: center; }
    .sub-cat:hover, .sub-cat.active { border-color: var(--red); background: rgba(232,0,29,0.04); }
    .sub-cat .sub-icon { font-size: 1.4rem; }
    .sub-cat .sub-label { font-size: 0.75rem; font-weight: 500; }
    .page-layout { display: grid; grid-template-columns: 240px 1fr; gap: 24px; padding: 0 5% 60px; }
    .sidebar { display: flex; flex-direction: column; gap: 18px; }
    .filter-box { background: white; border-radius: 10px; border: 1.5px solid var(--mid); padding: 18px; }
    .filter-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; margin-bottom: 14px; display: flex; justify-content: space-between; }

    .filter-option label { font-size: 0.85rem; cursor: pointer; display: flex; justify-content: space-between; width: 100%; }
    .filter-option label span { color: var(--muted); font-size: 0.78rem; }
    .range-inputs { display: flex; gap: 8px; margin-bottom: 12px; margin-top: 8px; }

    .range-inputs input:focus { border-color: var(--red); }
    .apply-btn { width: 100%; margin-top: 10px; padding: 9px; background: var(--red); color: white; border: none; border-radius: 6px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.82rem; cursor: pointer; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; background: white; border: 1.5px solid var(--mid); border-radius: 10px; padding: 12px 18px; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .results-count { font-size: 0.85rem; color: var(--muted); }
    .results-count strong { color: var(--text); }
    .toolbar-right { display: flex; align-items: center; gap: 12px; }
    .sort-select { border: 1.5px solid var(--mid); border-radius: 6px; padding: 7px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.83rem; outline: none; cursor: pointer; background: white; }
    .view-toggle { display: flex; gap: 4px; }
    .view-btn { width: 34px; height: 34px; border: 1.5px solid var(--mid); border-radius: 6px; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: all 0.2s; }
    .view-btn.active { background: var(--red); border-color: var(--red); color: white; }
    .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .product-grid.list-view { grid-template-columns: 1fr; }
    .product-grid.list-view .product-card { display: flex; flex-direction: row; }
    .product-grid.list-view .product-img { width: 180px; flex-shrink: 0; height: auto; min-height: 150px; }
    .product-grid.list-view .product-info { flex: 1; padding: 18px; }
    .product-card { background: white; border-radius: 10px; overflow: hidden; border: 1.5px solid var(--mid); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; position: relative; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.1); }
    .product-tag { position: absolute; top: 10px; left: 10px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; z-index: 2; }
    .tag-sale { background: var(--red); color: white; }
    .tag-new { background: var(--accent); color: var(--dark); }
    .tag-hot { background: #FF6B00; color: white; }
    .wishlist-btn { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; z-index: 2; font-size: 0.85rem; }
    .wishlist-btn:hover { background: var(--red); }
    .product-img { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }
    .product-info { padding: 13px; }
    .product-brand { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .product-name { font-size: 0.88rem; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
    .product-rating { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
    .stars { color: #FFB800; font-size: 0.75rem; }
    .rating-count { font-size: 0.7rem; color: var(--muted); }
    .product-pricing { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .price-now { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--red); }

    .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 32px; }

    .page-btn:hover { border-color: var(--red); color: var(--red); }

    .toast { position: fixed; bottom: 30px; right: 30px; background: var(--dark); color: white; padding: 14px 22px; border-radius: 8px; font-size: 0.88rem; box-shadow: 0 8px 24px rgba(0,0,0,0.3); transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 999; border-left: 4px solid var(--red); }

  </style>
</head>

  laptops:  {hp:['HP'],dell:['Dell'],lenovo:['Lenovo'],asus:['Asus'],macbooks:['Apple'],gaming:['MSI','Asus','HP'],chromebooks:['HP','Acer']},
  tvs:      {'smart tvs':['Samsung','LG','Hisense','TCL','Sony','Skyworth','Vitron'],'4k tvs':['Samsung','LG','Hisense','TCL','Sony'],oled:['Sony','LG'],led:['Hisense','TCL','Vitron','Skyworth'],monitors:['LG','Samsung']},
  fashion:  {men:['Nike','Adidas','H&M','Puma'],women:['Zara','H&M'],kids:['H&M'],shoes:['Nike','Adidas','Puma','New Balance'],bags:['Zara'],watches:[]},
  beauty:   {skincare:['Nivea','Garnier','Neutrogena','Vaseline'],makeup:['Maybelline',"L'Oreal"],haircare:['Garnier'],perfumes:['Various'],grooming:['OXY','Dove']}
};

// Filter products by sub
function getProducts() {
  if (activeSub === 'all') return cat.products;
  const map = SUB_FILTER[key] || {};
  const brands = map[activeSub] || map[activeSub.replace(/\s+/g,'')] || [];
  if (!brands.length) return cat.products;
  return cat.products.filter(p => brands.some(br => p.b.toLowerCase().includes(br.toLowerCase())));
}

const filtered = getProducts();
const subLabel = activeSub === 'all' ? cat.name : cat.sub.find(s => s.toLowerCase() === activeSub) || activeSub;

document.title = (activeSub !== 'all' ? subLabel + ' – ' : '') + cat.name + ' – LiveMart Kenya';
document.getElementById('breadcrumbCat').innerHTML =
  `<a href="category.html?cat=${key}" style="color:var(--muted);text-decoration:none">${cat.name}</a>` +
  (activeSub !== 'all' ? ` › <span style="color:var(--text);font-weight:500">${subLabel}</span>` : '');
document.getElementById('bannerTitle').innerHTML = activeSub !== 'all'
  ? `${cat.name.split(' ')[0]} <span>${subLabel}</span>`
  : cat.name.split(' ').map((w,i,a) => i===a.length-1 ? `<span>${w}</span>` : w).join(' ');
document.getElementById('bannerSub').textContent = filtered.length + ' products · ' + (activeSub !== 'all' ? subLabel + ' collection' : 'Top brands available');
document.getElementById('bannerIcons').textContent = cat.icons;
document.getElementById('catBanner').style.background = cat.color;
document.getElementById('resultTotal').textContent = filtered.length;
document.getElementById('resultRange').textContent = '1–' + filtered.length;

// Nav
document.getElementById('catNav').innerHTML = '<a href="index.html">🏠 All</a>' +
  NAV.map(n => `<a href="category.html?cat=${n.k}" class="${n.k===key?'active':''}">${n.l}</a>`).join('');

// Sub cats — clicking navigates to ?cat=x&sub=y
document.getElementById('subCats').innerHTML = cat.sub.map((s,i) => {
  const subKey = s.toLowerCase().replace(/\s+/g,'-');
  const isActive = (i===0 && activeSub==='all') || s.toLowerCase()===activeSub;
  const href = i===0 ? `category.html?cat=${key}` : `category.html?cat=${key}&sub=${encodeURIComponent(s.toLowerCase())}`;
  return `<div class="sub-cat ${isActive?'active':''}" onclick="location.href='${href}'">
    <span class="sub-icon">${i===0?cat.icon:'•'}</span>
    <span class="sub-label">${s}</span></div>`;
}).join('');

// Brands
document.getElementById('brandFilter').innerHTML = '<div class="filter-title">Brand <span>Clear</span></div>' +
  cat.brands.map((b,i) => `<div class="filter-option"><input type="checkbox" id="b${i}" ${i<2?'checked':''}/><label for="b${i}">${b} <span>(${20+i*7})</span></label></div>`).join('');

// Render products
function renderProducts(list) {
  if (!list.length) {
    document.getElementById('productGrid').innerHTML =
      `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">
        <div style="font-size:3rem;margin-bottom:12px">🔍</div>
        <h3 style="font-family:'Syne',sans-serif;margin-bottom:8px">No products found</h3>
        <p>Try a different subcategory or <a href="category.html?cat=${key}" style="color:var(--red)">view all ${cat.name}</a></p>
      </div>`;
    return;
  }
  document.getElementById('productGrid').innerHTML = list.map(p => {
    const tagHtml = p.t ? `<span class="product-tag tag-${p.t}">${p.t==='sale'?'-'+p.d+'%':p.t.charAt(0).toUpperCase()+p.t.slice(1)}</span>` : '';
    const stars = '★'.repeat(p.r)+'☆'.repeat(5-p.r);
    const name = p.n.replace(/'/g,"&#39;");
    return `<div class="product-card" onclick="location.href='product.html'">
      ${tagHtml}<div class="wishlist-btn">❤</div>
      <div class="product-img" style="background:${p.bg}">${p.e}</div>
      <div class="product-info">
        <div class="product-brand">${p.b}</div>
        <div class="product-name">${p.n}</div>
        <div class="product-rating"><span class="stars">${stars}</span><span class="rating-count">(${p.rv.toLocaleString()})</span></div>
        <div class="product-pricing"><span class="price-now">KES ${p.p.toLocaleString()}</span><span class="price-old">KES ${p.o.toLocaleString()}</span><span class="price-off">-${p.d}%</span></div>
        <button class="add-to-cart" onclick="event.stopPropagation();addToCart('${name}')">Add to Cart</button>
      </div></div>`;
  }).join('');
}
renderProducts(filtered);

let cart = 0;
function addToCart(name) {
  cart++;
  document.getElementById('cartCount').textContent = cart;
  const t = document.getElementById('toast');
  t.textContent = `🛒 "${name}" added to cart!`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function setView(type, btn) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('productGrid').classList.toggle('list-view', type==='list');
}
</script>
</body>
</html>
